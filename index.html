<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Shoes</title>
  <style>
    /* ===================== RESET ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #b5f2a0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ===================== NAVBAR ===================== */
    .navbar {
      background-color: #7ddc6e;
      padding: 14px 0;
      text-align: center;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .navbar ul li a {
      font-size: 16px;
      font-weight: 700;
      color: #111111;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .navbar ul li a:hover {
      text-decoration: underline;
    }

    /* ===================== HERO ===================== */
    .hero {
      background-color: #f28b82;
      display: flex;
      align-items: stretch;
      min-height: 200px;
    }

    .hero-left {
      flex: 1;
      padding: 30px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-label {
      font-size: 16px;
      font-weight: 800;
      color: #111111;
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 58px;
      font-weight: 900;
      color: #111111;
      line-height: 1;
    }

    .hero-right {
      width: 340px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .hero-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===================== SECTION TITLE ===================== */
    .section-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #111111;
      padding: 24px 0 16px;
      background-color: #b5f2a0;
    }

    /* ===================== PRODUCTS GRID ===================== */
    .products {
      background-color: #b5f2a0;
      padding: 0 30px 30px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .product-card {
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      padding: 16px 12px 20px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .product-card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .product-card img {
      width: 100%;
      height: 120px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #111111;
    }

    /* ===================== FOOTER ===================== */
    .footer {
      background-color: #f28b82;
      text-align: center;
      padding: 20px;
      font-size: 16px;
      font-weight: 700;
      color: #111111;
    }
  </style>
</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar">
    <ul>
      <li><a href="#">HOME</a></li>
      <li><a href="#">NEW</a></li>
      <li><a href="#">TRENDING</a></li>
      <li><a href="#">SHOP</a></li>
      <li><a href="#">CONTACT</a></li>
    </ul>
  </nav>

  <!-- ==================== HERO ==================== -->
  <section class="hero">
    <div class="hero-left">
      <div class="hero-label">FOOTBALL SHOES</div>
      <div class="hero-title">SaLe 50%</div>
    </div>
    <div class="hero-right">
      <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=600&q=80" alt="Football shoes" />
    </div>
  </section>

  <!-- ==================== ARTIFICIAL TURF ==================== -->
  <div class="section-title">Football shoes for artificial turf fields</div>

  <section class="products">
    <div class="products-grid">

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=80" alt="Shoe 1" />
        <div class="product-price">29 $</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=300&q=80" alt="Shoe 2" />
        <div class="product-price">33 $</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1539185441755-769473a23570?w=300&q=80" alt="Shoe 3" />
        <div class="product-price">39$</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=300&q=80" alt="Shoe 4" />
        <div class="product-price">42$</div>
      </div>

    </div>
  </section>

  <!-- ==================== NATURAL GRASS ==================== -->
  <div class="section-title">Football shoes for natural grass fields</div>

  <section class="products">
    <div class="products-grid">

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=300&q=80" alt="Shoe 5" />
        <div class="product-price">58 $</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=300&q=80" alt="Shoe 6" />
        <div class="product-price">66 $</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1584735175315-9d5df23be620?w=300&q=80" alt="Shoe 7" />
        <div class="product-price">78$</div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1518002054494-3a6f94352e9d?w=300&q=80" alt="Shoe 8" />
        <div class="product-price">82$</div>
      </div>

    </div>
  </section>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    hotline: 0962572561
  </footer>

</body>
</html>
